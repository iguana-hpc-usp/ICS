export default "<div class=\"card m-3\">\n  <h6 class=\"card-header\">\n    <div style=\"float: left\">\n      <span>Groups</span>\n    </div>\n    <div style=\"float: right\">\n      <button class=\"btn-sm btn-primary\" style=\"width:100px\" (click)=\"addGroup()\">Add</button>\n    </div>\n  </h6>\n\n  <div *ngIf=\"load===0\">\n    <app-mat-progress-bar></app-mat-progress-bar>\n  </div>\n\n  <div *ngIf=\"(groups?.length <= 0 && load===1)\">\n    No records found.\n  </div>\n\n  <div class=\"filter\">\n    <mat-form-field>\n      <input matInput (keyup)=\"applyFilter($event.target.value)\" placeholder=\"Filter: \">\n    </mat-form-field>\n  </div>\n\n  <div class=\"example-container mat-elevation-z8 \">\n\n    <mat-table [dataSource]=\"dataSource\" matSort>\n\n      <!-- ID Column -->\n      <ng-container matColumnDef=\"Id\">\n        <mat-header-cell *matHeaderCellDef mat-sort-header> ID </mat-header-cell>\n        <mat-cell *matCellDef=\"let row\"> {{row.Id}} </mat-cell>\n      </ng-container>\n\n      <!-- Name Column -->\n      <ng-container matColumnDef=\"Name\">\n        <mat-header-cell *matHeaderCellDef mat-sort-header> Name </mat-header-cell>\n        <mat-cell *matCellDef=\"let row\"> {{row.Name}} </mat-cell>\n      </ng-container>\n\n      <!-- Action Column -->\n      <ng-container matColumnDef=\"Action\">\n        <mat-header-cell *matHeaderCellDef mat-sort-header> Action </mat-header-cell>\n        <mat-cell *matCellDef=\"let element\" class=\"action-link\">\n          <button mat-icon-button (click)=\"addMembers(element)\" style=\"margin-left: 20px;\"\n                  ngbPopover=\"Click to add or delete users\"\n                  triggers=\"mouseenter:mouseleave\"\n                  popoverTitle=\"Members\">\n            <mat-icon>groups</mat-icon>\n            ({{element.mCount}})\n          </button>\n          <button mat-icon-button (click)=\"deleteGroup(element)\">\n            <mat-icon>delete</mat-icon>\n          </button>\n          <button mat-icon-button (click)=\"editGroup(element)\" style=\"margin-left: 20px;\">\n            <mat-icon>edit</mat-icon>\n          </button>\n        </mat-cell>\n      </ng-container>\n\n      <mat-header-row *matHeaderRowDef=\"displayedColumns\"></mat-header-row>\n      <mat-row *matRowDef=\"let row; columns: displayedColumns;\">\n      </mat-row>\n    </mat-table>\n\n    <mat-paginator [pageSizeOptions]=\"[25, 50, 100]\"></mat-paginator>\n  </div>\n</div>\n"
