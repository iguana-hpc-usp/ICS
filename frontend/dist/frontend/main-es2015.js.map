export default "<div class=\"divTable\">\n    <div class=\"divTableBody\">\n        <div class=\"divTableRow\" *ngIf=\"userSession.Module==='Admin'\">\n            <div class=\"divTableCell\"><mat-icon>person</mat-icon></div>\n            <div class=\"divTableCell\"><a href=\"#\" (click)=\"setRoute('view-user'); false;\" style=\"margin-left: 20px;\">Users</a></div>\n        </div>\n        <div class=\"divTableRow\" *ngIf=\"userSession.Module==='Admin'\">\n            <div class=\"divTableCell\"><mat-icon>groups</mat-icon></div>\n            <div class=\"divTableCell\"><a href=\"#\"\n                                         (click)=\"setRoute('view-group'); false;\" style=\"margin-left: 20px;\">Groups</a></div>\n        </div>\n        <div class=\"divTableRow\">\n            <div class=\"divTableCell\"><mat-icon>format_list_numbered</mat-icon></div>\n            <div class=\"divTableCell\"><a href=\"#\" (click)=\"setRoute('view-exercise'); false;\" style=\"margin-left: 20px;\">Exercises</a></div>\n        </div>\n        <div class=\"divTableRow\" *ngIf=\"userSession.Module==='Admin'\">\n            <div class=\"divTableCell\"><mat-icon>settings</mat-icon></div>\n            <div class=\"divTableCell\"><a href=\"#\"\n                                         (click)=\"setRoute('settings'); false;\" style=\"margin-left: 20px;\">Settings</a>\n            </div>\n        </div>\n        <div class=\"divTableRow\">\n            <div class=\"divTableCell\"><mat-icon>code</mat-icon></div>\n            <div class=\"divTableCell\"><a href=\"#\" (click)=\"setRoute('view-code'); false;\" style=\"margin-left: 20px;\">Try a Code</a></div>\n        </div>\n    </div>\n</div>"
