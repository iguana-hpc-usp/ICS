export default "<div class=\"card-body op-mode\">\n  <mat-button-toggle-group #group=\"matButtonToggleGroup\" [value]=\"hostInfo.OpMode\" (click)=\"setOpMode(group.value)\">\n    <mat-button-toggle value=\"MASTER\" [disabled]=\"hostInfo['OpMode']==='MASTER'\">MASTER</mat-button-toggle>\n    <mat-button-toggle value=\"NODE\" [disabled]=\"hostInfo['OpMode']==='NODE'\">NODE</mat-button-toggle>\n    <mat-button-toggle value=\"LOCAL\" [disabled]=\"hostInfo['OpMode']==='LOCAL'\">LOCAL</mat-button-toggle>\n  </mat-button-toggle-group>\n</div>\n\n<div class=\"response text-center\" *ngIf=\"response.Name\">\n  <div *ngIf=\"response.Name==='ok' || response.Name==='info'\" class=\"{{response.Name}}\">{{response.Status}}\n    <app-mat-progress-bar></app-mat-progress-bar>\n  </div>\n  <div *ngIf=\"response.Name==='error'\" class=\"{{response.Name}}\">{{response.Status}}</div>\n</div>\n"
