export default "<div class=\"card m-3\">\n  <h6 class=\"card-header\">\n    <div style=\"float: left\">\n      <span>{{fe.Id.value ? \"Edit\":\"Add\"}} Group</span>\n    </div>\n    <div style=\"float: right\">\n      <button class=\"btn-sm btn-success\" (click)=\"setRoute('view-group')\" style=\"margin-left: 20px;\">Groups</button>\n    </div>\n  </h6>\n\n  <div class=\"col-md-6 group-container\">\n    <form [formGroup]=\"registerForm\" (ngSubmit)=\"onSubmit()\">\n\n      <div class=\"form-group\">\n        <label for=\"Name\">Group Name:</label>\n        <input type=\"text\" formControlName=\"Name\" placeholder=\"Name\" name=\"Name\" class=\"form-control\" id=\"Name\">\n        <div *ngIf=\"submitted && fe.Name.errors\" class=\"error response\">\n          <div *ngIf=\"fe.Name.errors.required\">Field is required</div>\n          <div *ngIf=\"fe.Name.errors.minlength\">Name must be at least 4 characters</div>\n        </div>\n      </div>\n\n      <div class=\"form-group\">\n        <label for=\"Name\">Description:</label>\n        <input type=\"text\" formControlName=\"Description\" placeholder=\"Description\"\n               name=\"Description\" class=\"form-control\" id=\"Description\">\n      </div>\n\n      <div class=\"form-group\">\n        <button class=\"btn-sm btn-success\">{{fe.Id.value ? \"Update\":\"Insert\"}}</button>\n      </div>\n    </form>\n  </div>\n</div>\n"
